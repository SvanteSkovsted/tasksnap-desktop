name: VocaFlow
options:
  bundleIdPrefix: io.vocaflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local Swift package — both targets import this so RecordingActivityAttributes
# has the same fully-qualified module name (VocaFlowShared.RecordingActivityAttributes)
# in both, which is what ActivityKit uses to match activity requests to extensions.
packages:
  VocaFlowShared:
    path: VocaFlowShared

targets:

  VocaFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VocaFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vocaflow.app
        INFOPLIST_FILE: VocaFlow/Info.plist
        DEVELOPMENT_TEAM: "8D786HJQF9"
        OTHER_SWIFT_FLAGS: "-DAPP_TARGET"
    entitlements:
      path: VocaFlow/VocaFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.vocaflow.app
    dependencies:
      - target: VocaFlowActivity
      - package: VocaFlowShared
        product: VocaFlowShared

  VocaFlowActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Shared intent stub (Button(intent:) needs the type at compile time).
      - path: VocaFlow/Intents/StopRecordingIntent.swift
      # Shared colour tokens.
      - path: VocaFlow/Extensions/Color+Hex.swift
      # Widget-only sources.
      - path: VocaFlowActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vocaflow.app.activity
        INFOPLIST_FILE: VocaFlowActivity/Info.plist
        DEVELOPMENT_TEAM: "8D786HJQF9"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    dependencies:
      - package: VocaFlowShared
        product: VocaFlowShared
