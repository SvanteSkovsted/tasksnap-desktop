name: VocaFlow
options:
  bundleIdPrefix: io.vocaflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  VocaFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VocaFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vocaflow.app
        INFOPLIST_FILE: VocaFlow/Info.plist
        DEVELOPMENT_TEAM: "8D786HJQF9"
    entitlements:
      path: VocaFlow/VocaFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.vocaflow.app
