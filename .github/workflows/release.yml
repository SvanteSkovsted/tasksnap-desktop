# ─────────────────────────────────────────────────────────────────────────────
# TaskSnap Release Workflow
#
# Triggers on version tags like v1.0.0, v1.2.3-beta, etc.
# Builds a universal macOS .dmg (arm64 + x86_64) and a Windows x64 .msi/.exe,
# then attaches both to a GitHub Release.
#
# Required repository secrets (Settings → Secrets → Actions):
#   VITE_SUPABASE_URL              - full Edge Function URL (e.g. https://xxx.supabase.co/functions/v1/capture-task)
#   VITE_SUPABASE_PUBLISHABLE_KEY  - Supabase anon/public key
#
# Optional secrets for macOS notarization (unsigned builds still work, but
# Gatekeeper will warn on first launch):
#   APPLE_CERTIFICATE            - base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD   - password for that certificate
#   APPLE_SIGNING_IDENTITY       - e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                     - your Apple ID email
#   APPLE_PASSWORD               - app-specific password for notarization
#   APPLE_TEAM_ID                - your 10-char Apple Team ID
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create/update the GitHub Release

# ── macOS universal build ─────────────────────────────────────────────────────
jobs:
  build-macos:
    name: macOS (universal binary)
    runs-on: macos-latest          # Apple M-series runner (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Install stable Rust + both Mac targets so we can build a universal binary
      - name: Set up Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Cache the Rust build artefacts keyed on Cargo.lock so incremental
      # rebuilds on subsequent tag pushes take ~3 min instead of ~20 min.
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      # Sync the version field in package.json and tauri.conf.json to the tag
      - name: Sync version from tag
        run: node scripts/set-version.cjs ${{ github.ref_name }}

      - name: Build (universal macOS, unsigned)
        env:
          VITE_SUPABASE_URL:             ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # "-" tells codesign to ad-hoc sign (no certificate required).
          # TAURI_SIGNING_PRIVATE_KEY empty disables Tauri's updater signing.
          APPLE_SIGNING_IDENTITY:        "-"
          TAURI_SIGNING_PRIVATE_KEY:     ""
        run: |
          npm run tauri build -- \
            --target universal-apple-darwin \
            --config '{"bundle":{"macOS":{"signingIdentity":null}}}'

      # Upload the .dmg to the GitHub Release (creates the release if it
      # doesn't exist yet; subsequent jobs add their files to the same one).
      - name: Upload .dmg to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true       # auto-generate from commits
          files: >
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

# ── Windows x64 build ─────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version from tag
        run: node scripts/set-version.cjs ${{ github.ref_name }}

      - name: Build (Windows x64)
        env:
          VITE_SUPABASE_URL:             ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run tauri build

      - name: Upload .msi and .exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
